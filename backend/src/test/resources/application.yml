spring:
  datasource:
    url: jdbc:h2:mem:campus_trade_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt-secret: test-secret-should-be-at-least-32-bytes-long
  redis:
    required: false
  verification-code:
    debug-return-enabled: false
