server:
  port: ${SERVER_PORT:8080}
  tomcat:
    max-swallow-size: 50MB

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  datasource:
    url: ${DB_URL:jdbc:mysql://110.40.131.82:3306/campus_trade?useSSL=false&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&allowPublicKeyRetrieval=true}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:110.40.131.82}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 3s
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:2475594430@qq.com}
    password: ${MAIL_PASSWORD:xanenspgxrmkecba}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          ssl:
            enable: true
            trust: smtp.qq.com
            required: false
          starttls:
            enable: false
        debug: false

mybatis:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.campustrade.platform
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

app:
  jwt-secret: ${JWT_SECRET:bXlfc3VwZXJfc2VjdXJlX2p3dF9rZXlfZm9yX2NhbXB1c190cmFkZV9hcHA=}
  jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  redis:
    required: ${REDIS_REQUIRED:true}
  cache:
    category-ttl-minutes: ${CACHE_CATEGORY_TTL_MINUTES:30}
    goods-list-ttl-minutes: ${CACHE_GOODS_LIST_TTL_MINUTES:2}
  verification-code:
    expire-minutes: ${VERIFICATION_CODE_EXPIRE_MINUTES:5}
    resend-cooldown-seconds: ${VERIFICATION_CODE_RESEND_COOLDOWN:60}
    hourly-limit: ${VERIFICATION_CODE_HOURLY_LIMIT:8}
    debug-return-enabled: ${VERIFICATION_CODE_DEBUG_RETURN:false}
    key-prefix: "auth:code:"
    limit-prefix: "auth:code:limit:"
  auth:
    max-login-failures: ${AUTH_MAX_LOGIN_FAILURES:5}
    lock-minutes: ${AUTH_LOCK_MINUTES:15}
  mail:
    enabled: ${APP_MAIL_ENABLED:true}
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:}
    ssl-enabled: true
    auth: true
    starttls-enabled: false
    debug: false
  minio:
    endpoint: ${MINIO_ENDPOINT:}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket: ${MINIO_BUCKET:}
    public-base-url: ${MINIO_PUBLIC_BASE_URL:}
    secure: ${MINIO_SECURE:false}
    auto-create-bucket: ${MINIO_AUTO_CREATE_BUCKET:true}
    presign-expiry-days: ${MINIO_PRESIGN_EXPIRY_DAYS:7}
