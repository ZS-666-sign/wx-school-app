spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL:jdbc:h2:mem:campus_trade;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  redis:
    required: ${REDIS_REQUIRED:false}
  verification-code:
    debug-return-enabled: ${VERIFICATION_CODE_DEBUG_RETURN_ENABLED:true}
